services:
  frontend:
    image: node:20-alpine
    container_name: bookstore-frontend-dev
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=development
      - VITE_API_PROXY_TARGET=http://host.docker.internal:8080
    restart: unless-stopped
